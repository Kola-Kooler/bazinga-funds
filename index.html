<!DOCTYPE html>
<html>
<head>
    <title>Bazinga Funds</title>
    <style>
        body{
            background:#0f172a;
            color:white;
            font-family:Arial,sans-serif;
            text-align:center;
            padding-top:80px;
        }

        .card{
            background:#1e293b;
            width:420px;
            margin:auto;
            padding:30px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,.4);
        }

        h1{
            color:#FFD700;
        }

        .balance{
            font-size:50px;
            margin:20px;
        }

        button{
            padding:15px 30px;
            font-size:18px;
            border:none;
            border-radius:12px;
            cursor:pointer;
            background:#22c55e;
            color:white;
        }

        button:hover{
            background:#16a34a;
        }
    </style>
</head>

<body>

<div class="card">

<h1>🏦 Bazinga Funds</h1>

<p>Current Balance</p>

<div class="balance">₱3,000</div>

<button onclick="alert('Money Added! 💸')">
Add Money
</button>

</div>

</body>
</html>
