<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Bazinga Funds 🐷</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins,sans-serif;
}

body{

background:
linear-gradient(135deg,#081420,#0f172a,#1d4ed8);

background-size:400% 400%;

animation:bg 15s infinite alternate;

color:white;

display:flex;

justify-content:center;

align-items:center;

min-height:100vh;

padding:30px;

}

@keyframes bg{

0%{background-position:left;}
100%{background-position:right;}

}

.container{

width:460px;

background:rgba(255,255,255,.08);

backdrop-filter:blur(22px);

border-radius:25px;

padding:28px;

box-shadow:0 25px 50px rgba(0,0,0,.35);

border:1px solid rgba(255,255,255,.15);

}

h1{

text-align:center;

font-size:32px;

margin-bottom:5px;

}

.subtitle{

text-align:center;

opacity:.7;

margin-bottom:25px;

}

.card{

background:linear-gradient(135deg,#1d4ed8,#3b82f6,#60a5fa);

height:220px;

border-radius:22px;

padding:25px;

display:flex;

flex-direction:column;

justify-content:space-between;

box-shadow:0 20px 40px rgba(0,0,0,.3);

margin-bottom:25px;

transition:.3s;

}

.card:hover{

transform:rotateX(5deg) rotateY(-5deg);

}

.top{

display:flex;

justify-content:space-between;

align-items:center;

}

.pig{

font-size:48px;

}

.chip{

width:55px;

height:42px;

background:gold;

border-radius:8px;

}

.number{

font-size:23px;

letter-spacing:3px;

}

.bottom{

display:flex;

justify-content:space-between;

font-size:14px;

}

.balanceBox{

background:rgba(255,255,255,.08);

padding:18px;

border-radius:18px;

margin-bottom:18px;

text-align:center;

}

.balanceTitle{

opacity:.7;

}

.balance{

font-size:42px;

font-weight:bold;

margin-top:5px;

}

.grid{

display:grid;

grid-template-columns:1fr 1fr;

gap:15px;

margin-bottom:20px;

}

.smallBox{

background:rgba(255,255,255,.08);

padding:15px;

border-radius:18px;

text-align:center;

}

.smallBox h3{

font-size:14px;

opacity:.7;

margin-bottom:8px;

}

.smallBox p{

font-size:24px;

font-weight:bold;

}

.buttons{

display:grid;

grid-template-columns:1fr 1fr;

gap:12px;

margin-bottom:20px;

}

button{

padding:15px;

border:none;

border-radius:14px;

font-size:15px;

font-weight:600;

cursor:pointer;

transition:.2s;

}

button:hover{

transform:translateY(-3px);

}

.deposit{

background:#22c55e;

color:white;

}

.withdraw{

background:#ef4444;

color:white;

}

.savings{

background:#0ea5e9;

color:white;

}

.loan{

background:#f59e0b;

color:white;

}

.history{

background:rgba(255,255,255,.08);

padding:15px;

border-radius:18px;

}

.history h2{

font-size:18px;

margin-bottom:10px;

}

#transactions{

max-height:220px;

overflow-y:auto;

}

.transaction{

display:flex;

justify-content:space-between;

padding:8px 0;

border-bottom:1px solid rgba(255,255,255,.08);

}

footer{

margin-top:20px;

text-align:center;

font-size:12px;

opacity:.55;

}

</style>

</head>

<body>

<div class="container">

<h1>🐷 Bazinga Funds</h1>

<p class="subtitle">
The Future of Fake Banking
</p>

<div class="card">

<div class="top">

<div class="chip"></div>

<div class="pig">
🐷
</div>

</div>

<div class="number">
4921 •••• •••• 8275
</div>

<div class="bottom">

<div>

CARD HOLDER<br>
KOLA-KOOLER

</div>

<div>

VALID THRU<br>
12/31

</div>

</div>

</div>

<div class="balanceBox">

<div class="balanceTitle">
Current Balance
</div>

<div class="balance" id="balance">
₱2,100
</div>

</div>

<div class="grid">

<div class="smallBox">

<h3>Savings</h3>

<p id="savings">
₱0
</p>

</div>

<div class="smallBox">

<h3>Loan</h3>

<p id="loan">
₱0
</p>

</div>

</div>

<div class="buttons">

<button class="deposit" onclick="deposit()">
💰 Deposit
</button>

<button class="withdraw" onclick="withdrawMoney()">
💸 Withdraw
</button>

<button class="savings" onclick="saveMoney()">
🏦 Savings
</button>

<button class="loan" onclick="loanMoney()">
💳 Loan
</button>

</div>

<div class="history">

<h2>Recent Transactions</h2>

<div id="transactions"></div>

</div>

<footer>

🐷 Bazinga Funds is a fictional banking simulator.

</footer>

</div>

<!-- JavaScript goes here in Part 2 -->

</body>
</html>
<script>

let balance = Number(localStorage.getItem("balance")) || 2100;
let savings = Number(localStorage.getItem("savings")) || 0;
let loan = Number(localStorage.getItem("loan")) || 0;

let history =
JSON.parse(localStorage.getItem("history")) || [];

function save(){

localStorage.setItem("balance",balance);
localStorage.setItem("savings",savings);
localStorage.setItem("loan",loan);
localStorage.setItem("history",JSON.stringify(history));

}

function addHistory(type,amount){

history.push({

type:type,
amount:amount,
time:new Date().toLocaleString()

});

if(history.length>30){

history.shift();

}

save();

}

function update(){

document.getElementById("balance").innerHTML=
"₱"+balance.toLocaleString();

document.getElementById("savings").innerHTML=
"₱"+savings.toLocaleString();

document.getElementById("loan").innerHTML=
"₱"+loan.toLocaleString();

const area=document.getElementById("transactions");

area.innerHTML="";

history.slice().reverse().forEach(item=>{

area.innerHTML+=`
<div class="transaction">
<div>

<b>${item.type}</b><br>
<small>${item.time}</small>

</div>

<div>${item.amount}</div>

</div>
`;

});

save();

}

function deposit(){

let amount=parseInt(prompt("Deposit amount"));

if(!amount || amount<=0)return;

balance+=amount;

addHistory("💰 Deposit","+₱"+amount.toLocaleString());

update();

}

function withdrawMoney(){

let amount=parseInt(prompt("Withdraw amount"));

if(!amount || amount<=0)return;

if(amount>balance){

alert("Insufficient funds.");

return;

}

balance-=amount;

addHistory("💸 Withdraw","-₱"+amount.toLocaleString());

update();

}

function saveMoney(){

let amount=parseInt(prompt("Move to savings"));

if(!amount || amount<=0)return;

if(amount>balance){

alert("Not enough balance.");

return;

}

balance-=amount;

savings+=amount;

addHistory("🏦 Savings","₱"+amount.toLocaleString());

update();

}

function loanMoney(){

let amount=parseInt(prompt("Loan amount"));

if(!amount || amount<=0)return;

loan+=amount;

balance+=amount;

addHistory("💳 Loan","+₱"+amount.toLocaleString());

update();

}

function repayLoan(){

if(loan<=0){

alert("No active loan.");

return;

}

let amount=parseInt(prompt("Repay loan"));

if(!amount || amount<=0)return;

if(amount>balance){

alert("Not enough balance.");

return;

}

if(amount>loan){

amount=loan;

}

balance-=amount;

loan-=amount;

addHistory("✅ Loan Payment","-₱"+amount.toLocaleString());

update();

}

function resetBank(){

if(confirm("Reset Bazinga Funds?")){

balance=2100;

loan=0;

savings=0;

history=[];

save();

update();

}

}

update();

</script>
